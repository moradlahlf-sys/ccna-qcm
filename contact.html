<!-- Logo pour Google (Search + Knowledge Panel) -->

<meta charset="UTF-8"/>

<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'DM Sans',sans-serif;max-width:600px;margin:40px auto;padding:0 20px;background:#020617;color:#e6edf3;line-height:1.7}
  h1{font-family:'JetBrains Mono',monospace;color:#00b4d8;font-size:24px;margin-bottom:8px;letter-spacing:-.03em}
  a{color:#00b4d8}
  .back{display:inline-block;margin-bottom:24px;color:#00b4d8;text-decoration:none;font-weight:600;font-family:'JetBrains Mono',monospace;font-size:13px}
  .back:hover{text-decoration:underline}
  p{color:#7a8fa8;margin-top:8px}
  form{display:flex;flex-direction:column;gap:12px;margin-top:24px}
  input,textarea{padding:11px 14px;border:1px solid #1e2d42;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:14px;color:#e6edf3;background:#0d1117;outline:none;transition:border .15s}
  input:focus,textarea:focus{border-color:#00b4d8}
  textarea{min-height:140px;resize:vertical}
  button{background:#00b4d8;color:#000;border:none;padding:11px 24px;border-radius:8px;font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s}
  button:hover{background:#22d3ee;box-shadow:0 0 20px rgba(0,180,216,.35)}
  .success{background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.3);color:#86efac;padding:14px;border-radius:8px;display:none}
</style>
</head>
<body>
<a href="/" class="back">← Retour au site</a>
<h1>Contact</h1>
<p>Une question, une erreur dans une question, ou une suggestion ? N'hésitez pas à nous écrire.</p>

<form id="contactForm">
  <input type="text" name="name" placeholder="Votre nom" required/>
  <input type="email" name="email" placeholder="Votre email" required/>
  <input type="text" name="subject" placeholder="Sujet"/>
  <textarea name="message" placeholder="Votre message..." required></textarea>
  <button type="submit">Envoyer le message</button>
</form>
<div class="success" id="success">✅ Message envoyé ! Nous vous répondrons dans les plus brefs délais.</div>

<script>
// Utilise Formspree - gratuit jusqu'à 50 messages/mois
// Remplace XXXXXXXX par ton ID Formspree (formspree.io)
document.getElementById('contactForm').addEventListener('submit', async function(e){
  e.preventDefault();
  const data = new FormData(this);
  try {
    const r = await fetch('https://formspree.io/f/xkopobok', {
      method: 'POST', body: data,
      headers: { 'Accept': 'application/json' }
    });
    if(r.ok){
      this.style.display='none';
      document.getElementById('success').style.display='block';
    }
  } catch(err) {
    alert('Erreur lors de l\'envoi. Réessayez.');
  }
});
</script>
</body>
</html>
